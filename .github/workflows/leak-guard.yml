name: leak-guard

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  deny-listed-paths:
    name: working-artifact deny-listed paths must not be tracked
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: fail if deny-listed working-artifact paths reappear
        run: |
          set -euo pipefail
          deny_prefixes='^(\.development/)'
          offenders=$(git ls-files | grep -E "$deny_prefixes" || true)
          if [ -n "$offenders" ]; then
            echo "::error::Policy invariant violated: local working-artifact paths are tracked in the repo."
            echo "::error::Policy: working files stay local; GitHub repo is a clean installable public release."
            echo "::error::Source: .development/plans/active.md."
            echo "::error::Deny-listed prefix: .development/ (the single local working-artifact tree)."
            echo "::error::This prefix must remain ignored via .gitignore and must not be tracked."
            echo "::error::Offending tracked paths:"
            printf '::error::  %s\n' $offenders
            exit 1
          fi
          echo "leak-guard: no deny-listed working-artifact paths tracked."

  stray-work-items:
    name: work items live only in .development/BACKLOG.md
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: fail on stray work-item markers or unchecked checkboxes
        run: python3 scripts/gate_stray_work_items.py

  doc-gates:
    name: doc gates + regen-diff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        # setup-python's interpreter is not externally-managed, so the pinned pip
        # install below is safe on PEP-668 runners (ubuntu-24.04). Same SHA as ci.yml.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: install PyYAML (gen_docs parses the manifest `requires` field)
        run: python3 -m pip install --quiet "pyyaml==6.0.3"

      - name: link integrity, counts, banned terms, registry, stub budget
        run: python3 scripts/gate_docs.py

      - name: generated docs match regeneration
        run: python3 scripts/gen_docs.py --check
