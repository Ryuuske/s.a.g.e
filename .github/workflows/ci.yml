name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff (Linux / Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        # Version-pinned to prevent a yanked or compromised uv release silently
        # altering pip-audit or test output.  Update pin via dependabot/Renovate.
        run: pip install --user uv==0.11.16

      - name: uv sync
        run: $HOME/.local/bin/uv sync

      - name: ruff check (whole repo)
        run: $HOME/.local/bin/uv run ruff check .

      - name: ruff format --check (whole repo)
        run: $HOME/.local/bin/uv run ruff format --check .

      - name: pytest
        run: $HOME/.local/bin/uv run pytest -q

      - name: pip-audit (dependency vulnerability scan)
        # CVE-2026-45829 ignored per docs/decisions/0090 — not reachable in embedded mode, no patched chromadb exists
        run: |
          $HOME/.local/bin/uv export --format requirements-txt --no-emit-project -o /tmp/reqs.txt
          $HOME/.local/bin/uvx pip-audit -r /tmp/reqs.txt --ignore-vuln CVE-2026-45829

      - name: framework-surface --check
        # Full Contract-A gating restored per docs/decisions/0096 (ADR-0080 advisory escape hatch removed)
        run: $HOME/.local/bin/uv run python scripts/measure_framework_surface.py --check

      - name: install.sh dry-run smoke
        run: |
          export CLAUDE_DIR=$(mktemp -d -t sage_ci_XXXX)
          bash install.sh --dry-run --no-per-repo-claude-md --claude-md=no

  ts-web:
    name: TS web (layout engine + 3D renderer — typecheck + vitest + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/sage_mcp/estate/web

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/sage_mcp/estate/web/package-lock.json

      # esbuild's install script is an accepted bounded risk: contents:read scope
      # only, no secrets in scope, and esbuild is a well-audited build tool.
      - name: npm ci
        run: npm ci

      - name: npm audit (dependency vulnerability gate)
        # --audit-level=high blocks on high/critical advisories, mirroring the pip-audit
        # gate in the test job (ci.yml:41-45, governed by ADR-0079).
        # Dev-only/non-reachable advisories should be documented in an ADR and
        # suppressed via .nsprc or --omit using the same pattern as pip-audit.
        run: npm audit --audit-level=high

      - name: tsc --noEmit (production sources)
        run: ./node_modules/.bin/tsc --noEmit

      - name: tsc --project tsconfig.test.json (test sources incl. render tests)
        run: ./node_modules/.bin/tsc --project tsconfig.test.json

      - name: vitest run (layout + 3D scene tests)
        run: ./node_modules/.bin/vitest run

      - name: vite build (single-file estate.html smoke)
        run: npm run build

  windows-install-smoke:
    name: install.ps1 dry-run smoke (Windows / Python 3.12)
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: install.ps1 dry-run smoke
        shell: pwsh
        run: |
          $env:CLAUDE_DIR = Join-Path $env:TEMP "sage_ci_$([System.IO.Path]::GetRandomFileName())"
          pwsh -ExecutionPolicy Bypass -File .\install.ps1 -DryRun -NoPerRepoClaudeMd -ClaudeMd no
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
