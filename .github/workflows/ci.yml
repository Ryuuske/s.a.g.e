name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff (Linux / Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        # Version-pinned to prevent a yanked or compromised uv release silently
        # altering pip-audit or test output.  Update pin via dependabot/Renovate.
        run: pip install --user uv==0.11.16

      - name: uv sync
        run: $HOME/.local/bin/uv sync

      - name: ruff check (whole repo)
        run: $HOME/.local/bin/uv run ruff check .

      - name: ruff format --check (whole repo)
        run: $HOME/.local/bin/uv run ruff format --check .

      - name: pytest
        run: $HOME/.local/bin/uv run pytest -q

      - name: pip-audit (dependency vulnerability scan)
        # CVE-2026-45829 ignored per docs/decisions/0090 — not reachable in embedded mode, no patched chromadb exists
        run: |
          $HOME/.local/bin/uv export --format requirements-txt --no-emit-project -o /tmp/reqs.txt
          $HOME/.local/bin/uvx pip-audit -r /tmp/reqs.txt --ignore-vuln CVE-2026-45829

      - name: framework-surface --check
        # Full Contract-A gating restored per docs/decisions/0096 (ADR-0080 advisory escape hatch removed)
        run: $HOME/.local/bin/uv run python scripts/measure_framework_surface.py --check

      - name: install.sh dry-run smoke
        run: |
          export CLAUDE_DIR=$(mktemp -d -t sage_ci_XXXX)
          bash install.sh --dry-run --no-per-repo-claude-md --claude-md=no

  windows-install-smoke:
    name: install.ps1 dry-run smoke (Windows / Python 3.12)
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: install.ps1 dry-run smoke
        shell: pwsh
        run: |
          $env:CLAUDE_DIR = Join-Path $env:TEMP "sage_ci_$([System.IO.Path]::GetRandomFileName())"
          pwsh -ExecutionPolicy Bypass -File .\install.ps1 -DryRun -NoPerRepoClaudeMd -ClaudeMd no
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
